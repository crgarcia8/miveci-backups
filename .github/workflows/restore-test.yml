name: Restore Test

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore backup
        env:
          DATABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
        run: |
          LATEST_BACKUP=$(ls backups/*.dump.gz | sort | tail -n 1)

          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            -v ${{ github.workspace }}/backups:/backups \
            postgres:17 \
            sh -c "
              gunzip -c /backups/$(basename $LATEST_BACKUP) > /tmp/backup.dump
              pg_restore \
                --clean \
                --verbose \
                --no-owner \
                --no-privileges \
                --if-exists \
                --dbname=\"\$DATABASE_URL\" \
                /tmp/backup.dump
            "
