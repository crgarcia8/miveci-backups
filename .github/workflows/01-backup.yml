name: 01-Backup Databases

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create backup directory
        run: mkdir -p backups

      # -----------------------------
      # Backup Supabase
      # -----------------------------
      - name: Backup Supabase
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            -v ${{ github.workspace }}/backups:/backups \
            postgres:17 \
            sh -c 'pg_dump "$DATABASE_URL" \
              -F c \
              --schema=public \
              --no-owner \
              --no-privileges \
            | gzip > /backups/supabase-backup-$(date +%F).dump.gz'

      # -----------------------------
      # Backup Neon
      # -----------------------------
      - name: Backup Neon
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            -v ${{ github.workspace }}/backups:/backups \
            postgres:17 \
            sh -c 'pg_dump "$DATABASE_URL" \
              -F c \
              --schema=public \
              --schema=auth \
              --no-owner \
              --no-privileges \
            | gzip > /backups/neon-backup-$(date +%F).dump.gz'

      - name: Verify backups
        run: |
          ls -lh backups

      - name: Commit backups
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add backups

          git commit -m "Database backups $(date +%F)" || echo "No changes"

          git push
