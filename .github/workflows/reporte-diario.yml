name: Reporte Diario MiVeci

on:
  schedule:
    - cron: '0 11 * * *' # 6:00 AM Bogotá
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Ejecutar query
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          psql "$DATABASE_URL" <<'SQL' > reporte.csv
          COPY (
            SELECT
                ne.evento_sesion_id,
                u.email,
                COUNT(*) AS eventos
            FROM public.negocios_eventos ne
            LEFT JOIN auth.users u
                ON ne.evento_usuario_id = u.id
            WHERE ne.evento_sesion_id IN (
                SELECT evento_sesion_id
                FROM public.negocios_eventos
                WHERE DATE(evento_created_at) = CAST(current_date - interval '1 day' as DATE)
                GROUP BY evento_sesion_id
            )
            GROUP BY ne.evento_sesion_id, u.email
            ORDER BY ne.evento_sesion_id DESC
          ) TO STDOUT WITH CSV HEADER;
          SQL

      - name: Mostrar resultado
        run: cat reporte.csv

      - name: Enviar correo
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Reporte Diario MiVeci
          to: crgarcia8@gmail.com
          from: MiVeci Bot
          body: Reporte generado automáticamente.
          attachments: reporte.csv
