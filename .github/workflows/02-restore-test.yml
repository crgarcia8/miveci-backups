name: 02-Restore Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. CLEAN DATABASE (solo schema public)
      - name: Clean database
        env:
          DATABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
        run: |
          docker run --rm \
            postgres:17 \
            psql "$DATABASE_URL" \
            -c "drop schema public cascade; create schema public;"

      # 2. RESTORE BACKUP
      - name: Restore backup
        env:
          DATABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
        run: |
          LATEST_BACKUP=$(ls backups/*.dump.gz | sort | tail -n 1)

          docker run --rm \
            -v ${{ github.workspace }}/backups:/backups \
            postgres:17 \
            sh -c "
              gunzip -c /backups/$(basename $LATEST_BACKUP) > /tmp/backup.dump

              pg_restore \
                --verbose \
                --no-owner \
                --no-privileges \
                --dbname=\"$DATABASE_URL\" \
                /tmp/backup.dump
            "
